name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # - name: Clone Zotero Plugin Scaffold
      #   run: |
      #     cd ..
      #     # git clone --branch add-test https://github.com/windingwind/zotero-plugin-scaffold.git zotero-plugin-scaffold
      #     git clone --branch fix-xvfb https://github.com/northword/zotero-plugin-scaffold.git zotero-plugin-scaffold
      #     cd -
      #     cd ../zotero-plugin-scaffold
      #     pnpm install
      #     pnpm run build
      #     cd -

      - name: Install deps
        run: |
          echo "public-hoist-pattern[]=@types*" >> .npmrc
          pnpm install
          # pnpm link ../zotero-plugin-scaffold

      - name: Run Test Client
        run: |
          pnpm test:client
