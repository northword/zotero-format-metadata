name: pr-comment

on:
  workflow_run:
    workflows: [ci]
    types:
      - completed

permissions:
  pull-requests: write
  issues: write
  actions: read

jobs:
  comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests[0];
            if (!pr) return;

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const xpiArtifact = artifacts.artifacts.find(a => a.name === 'linter-for-zotero');
            if (!xpiArtifact) return;

            // Mark previous build comments as outdated
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const oldComments = comments.filter(c =>
              c.user && c.user.type === 'Bot' &&
              c.body && c.body.includes('Build Artifact')
            );
            for (const comment of oldComments) {
              const query = `mutation($id: ID!) {
                minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                  clientMutationId
                }
              }`;
              try {
                await github.graphql(query, { id: comment.node_id });
              } catch {
                // Minimization may not be available for all tokens;
                // fall through and still post the new comment.
              }
            }

            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}/artifacts/${xpiArtifact.id}`;
            const shortSha = run.head_sha.substring(0, 7);
            const body = `## Build Artifact

            - **Commit**: [\`${shortSha}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${run.head_sha})
            - **XPI**: [Download](${artifactUrl})`;

            await github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
